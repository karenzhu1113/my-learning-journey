<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间账本 - 个人时间管理工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .hamburger {
            cursor: pointer;
            width: 24px;
            height: 24px;
            position: relative;
            z-index: 50;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: #1e40af;
            margin: 5px 0;
            transition: 0.3s;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(-45deg) translate(-5px, 6px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(45deg) translate(-5px, -6px);
        }
        .mobile-menu {
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        .mobile-menu.active {
            transform: translateX(0);
        }
        .feature-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(30, 64, 175, 0.1);
        }
    </style>
</head>
<body class="bg-white text-gray-800">
    <nav class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-sm z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-semibold text-blue-600">时间账本</span>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#home" class="text-gray-600 hover:text-blue-600 transition-colors font-medium">首页</a>
                    <a href="#features" class="text-gray-600 hover:text-blue-600 transition-colors font-medium">关于</a>
                    <a href="#contact" class="text-gray-600 hover:text-blue-600 transition-colors font-medium">联系</a>
                </div>
                <button class="md:hidden hamburger" id="hamburgerBtn">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
        <div class="md:hidden mobile-menu fixed inset-0 top-16 bg-white z-30" id="mobileMenu">
            <div class="flex flex-col items-center justify-center h-full space-y-8">
                <a href="#home" class="text-xl text-gray-600 hover:text-blue-600 transition-colors font-medium">首页</a>
                <a href="#features" class="text-xl text-gray-600 hover:text-blue-600 transition-colors font-medium">关于</a>
                <a href="#contact" class="text-xl text-gray-600 hover:text-blue-600 transition-colors font-medium">联系</a>
            </div>
        </div>
    </nav>
    <section id="home" class="pt-24 pb-16 md:pt-32 md:pb-24">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-12">
                <div class="flex-1 flex justify-center md:justify-start">
                    <div class="relative">
                        <div class="w-48 h-48 md:w-64 md:h-64 bg-gradient-to-br from-blue-400 to-blue-700 rounded-2xl flex items-center justify-center shadow-2xl">
                            <svg class="w-24 h-24 md:w-32 md:h-32 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 12h.01M12 15h.01M12 18h.01"></path>
                            </svg>
                        </div>
                        <div class="absolute -top-4 -right-4 w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center shadow-lg">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="flex-1 text-center md:text-left">
                    <h1 class="text-4xl md:text-5xl lg:text-6xl font-light text-gray-900 mb-4">
                        时间账本
                    </h1>
                    <p class="text-lg md:text-xl text-gray-500 mb-8 leading-relaxed">
                        让每一分钟都有价值，智能管理你的时间，提升效率，实现目标。
                    </p>
                    <button class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-medium text-lg transition-colors shadow-lg hover:shadow-xl">
                        联系我
                    </button>
                </div>
            </div>
        </div>
    </section>
    <section id="features" class="py-16 md:py-24 bg-gray-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h2 class="text-3xl md:text-4xl font-light text-gray-900 mb-4">核心功能</h2>
                <p class="text-gray-500 text-lg">全方位的个人时间管理解决方案</p>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="feature-card bg-white rounded-xl p-6 shadow-md">
                    <div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center mb-4">
                        <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-semibold text-gray-900 mb-2">待办管理</h3>
                    <p class="text-gray-500">只显示当天任务，支持状态筛选（全部/已启动/已完成）</p>
                </div>
                <div class="feature-card bg-white rounded-xl p-6 shadow-md">
                    <div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center mb-4">
                        <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-semibold text-gray-900 mb-2">计时系统</h3>
                    <p class="text-gray-500">一键开始/暂停/结束，自动同步任务状态</p>
                </div>
                <div class="feature-card bg-white rounded-xl p-6 shadow-md">
                    <div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center mb-4">
                        <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-semibold text-gray-900 mb-2">24小时时间轴</h3>
                    <p class="text-gray-500">可视化展示当天所有活动，一目了然</p>
                </div>
                <div class="feature-card bg-white rounded-xl p-6 shadow-md">
                    <div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center mb-4">
                        <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <h3 class="text-xl font-semibold text-gray-900 mb-2">周/月视图</h3>
                    <p class="text-gray-500">多维度查看时间分布，合理规划日程</p>
                </div>
            </div>
        </div>
    </section>
    <section id="contact" class="py-16 md:py-24">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-12">
                <h2 class="text-3xl md:text-4xl font-light text-gray-900 mb-4">联系我们</h2>
                <p class="text-gray-500 text-lg">有任何问题或建议，欢迎随时与我们联系</p>
            </div>
            <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8">
                <form>
                    <div class="mb-6">
                        <label class="block text-gray-700 mb-2 font-medium">姓名</label>
                        <input type="text" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" placeholder="请输入您的姓名">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 mb-2 font-medium">邮箱</label>
                        <input type="email" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" placeholder="请输入您的邮箱">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 mb-2 font-medium">留言</label>
                        <textarea class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all resize-none" rows="4" placeholder="请输入您的留言"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium transition-colors">
                        发送消息
                    </button>
                </form>
            </div>
        </div>
    </section>
    <footer class="bg-gray-900 text-white py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-400">© 2026 时间账本. 保留所有权利.</p>
        </div>
    </footer>
    <script>
        document.getElementById('hamburgerBtn').addEventListener('click', function() {
            this.classList.toggle('active');
            document.getElementById('mobileMenu').classList.toggle('active');
        });
        document.querySelectorAll('#mobileMenu a').forEach(function(link) {
            link.addEventListener('click', function() {
                document.getElementById('hamburgerBtn').classList.remove('active');
                document.getElementById('mobileMenu').classList.remove('active');
            });
        });
    </script>
</body>
</html>
